# ===============================
# CONFIG IMPORT — charge .env.properties depuis la racine du projet
# Ce fichier contient les secrets et N'EST PAS commité dans Git
# ===============================
spring.config.import=optional:file:.env.dev.properties

# ===============================
# DATABASE
# ===============================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# SERVER
# ===============================
server.port=8080

# ===============================
# JWT
# ===============================
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION}

# ===============================
# MAIL — Resend (HTTP API)
# ===============================
resend.api-key=${RESEND_API_KEY}
app.mail.from=${MAIL_FROM:hr@secogroupe.com}

# ===============================
# APP
# ===============================
app.base-url=${APP_BASE_URL}
app.frontend-url=${APP_FRONTEND_URL}
app.website-url=${WEBSITE_URL}
app.upload-dir=uploads
app.cookie.secure=${COOKIE_SECURE:true}

# true  = affiche l'OTP dans les logs (développement)
# false = envoi réel via SMTP (production)
app.mail.console-mode=true

# ===============================
# FILE UPLOAD
# ===============================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# ===============================
# LOGGING
# ===============================
logging.level.org.springframework.security=DEBUG
