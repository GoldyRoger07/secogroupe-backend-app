# ===============================
# DATABASE
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/secogroupe_app?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=latouche55

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# SERVER
# ===============================
server.port=8080

# ===============================
# JWT (on va l'utiliser après)
# ===============================
jwt.secret=MySuperSecretKey12345678901234567
jwt.expiration=900000
jwt.refresh-expiration=604800000

# ===============================
# MAIL — Microsoft 365 (hr@secogroupe.com)
# ===============================
spring.mail.host=smtp.office365.com
spring.mail.port=587
spring.mail.username=hr@secogroupe.com
spring.mail.password=secogroupe@2026
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# URL de base de l'API (utilisée dans les liens de vérification)
app.base-url=http://localhost:8080

# ===============================
# MAIL MODE
# ===============================
# true  = affiche l'OTP dans les logs (développement)
# false = envoi réel via SMTP (production)
app.mail.console-mode=true

# ===============================
# FILE UPLOAD
# ===============================
app.upload-dir=uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# ===============================
# LOGGING
# ===============================
logging.level.org.springframework.security=DEBUG